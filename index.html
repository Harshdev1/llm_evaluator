<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic AI Evaluator - Code-Mixed Robustness</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050510', 
                        gpt: '#00d2ff', gemini: '#ff007f', pplx: '#ffaa00',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.16/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; overflow-x: hidden; background-color: #050510; color: #fff; font-family: 'Inter', sans-serif; cursor: crosshair; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        #ui-layer { position: relative; z-index: 10; width: 100vw; height: 100vh; overflow-y: auto; overflow-x: hidden; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        .glass-panel {
            background: rgba(10, 10, 25, 0.6);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .input-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            transition: all 0.3s;
        }
        .input-box:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            outline: none;
        }

        .data-row { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-left: 3px solid transparent; }
        .data-row:hover { background: rgba(20, 20, 40, 0.8); transform: translateX(5px); border-left: 3px solid #00d2ff; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .btn-glow { position: relative; overflow: hidden; transition: all 0.3s ease; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); letter-spacing: 1px; }

        /* Floating Astronaut CSS */
        .astronaut {
            position: absolute;
            width: 150px;
            animation: float 15s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.8;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg) translateX(0px); }
            25% { transform: translateY(-20px) rotate(5deg) translateX(10px); }
            50% { transform: translateY(0px) rotate(0deg) translateX(20px); }
            75% { transform: translateY(20px) rotate(-5deg) translateX(10px); }
            100% { transform: translateY(0px) rotate(0deg) translateX(0px); }
        }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="ui-layer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // -------------------------
        // THREE.JS ASTRONOMICAL SCENE
        // -------------------------
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2('#050510', 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 20, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.enablePan = false; controls.autoRotate = true; controls.autoRotateSpeed = 0.5;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x222233, 1.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00d2ff, 3, 300);
        pointLight.position.set(50, 50, 50);
        scene.add(pointLight);
        const pointLight2 = new THREE.PointLight(0xff007f, 3, 300);
        pointLight2.position.set(-50, -50, -50);
        scene.add(pointLight2);

        // Stars (Particles)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 5000;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) {
            starPos[i] = (Math.random() - 0.5) * 1000;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // Central Planet
        const planetGeo = new THREE.SphereGeometry(25, 64, 64);
        const planetMat = new THREE.MeshStandardMaterial({ 
            color: 0x111122, 
            roughness: 0.4, 
            metalness: 0.1,
            emissive: 0x050510,
            wireframe: true
        });
        const planet = new THREE.Mesh(planetGeo, planetMat);
        scene.add(planet);

        // Orbiting Moons
        const moons = [];
        const colors = [0x00d2ff, 0xff007f, 0xffaa00];
        for(let i=0; i<3; i++) {
            const moonGeo = new THREE.SphereGeometry(3, 32, 32);
            const moonMat = new THREE.MeshStandardMaterial({ color: colors[i], emissive: colors[i], emissiveIntensity: 0.5, roughness: 0.2 });
            const moon = new THREE.Mesh(moonGeo, moonMat);
            moon.angle = i * (Math.PI * 2 / 3);
            moon.distance = 40 + Math.random() * 10;
            moon.speed = 0.005 + Math.random() * 0.005;
            moons.push(moon);
            scene.add(moon);
        }

        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            planet.rotation.y += 0.002;
            planet.rotation.x += 0.001;

            moons.forEach((moon, i) => {
                moon.angle += moon.speed;
                moon.position.x = Math.cos(moon.angle) * moon.distance;
                moon.position.z = Math.sin(moon.angle) * moon.distance;
                moon.position.y = Math.sin(time * 2 + i) * 5;
                moon.rotation.y += 0.01;
            });

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <!-- REACT APP -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const ToggleBtn = ({ label, active, onClick, activeClass }) => (
            <button onClick={onClick} className={`text-[10px] md:text-xs px-2 py-1.5 rounded border transition-colors font-mono ${active ? activeClass : 'bg-transparent border-white/20 text-gray-400 hover:border-white/40'}`}>
                {label}: {active ? 'YES' : 'NO'}
            </button>
        );

        const InputForm = ({ entries, setEntries, setPhase }) => {
            const handleAdd = () => {
                setEntries([...entries, { 
                    id: Date.now(), 
                    prompt: "", 
                    tokensN: 15, tokensLi: 10,
                    gptMono: true, gptMixed: true, gptCons: true,
                    gemMono: true, gemMixed: true, gemCons: true,
                    pplxMono: true, pplxMixed: true, pplxCons: true
                }]);
            };

            const updateField = (id, field, val) => {
                setEntries(entries.map(e => e.id === id ? { ...e, [field]: val } : e));
            };

            const toggleField = (id, field) => {
                setEntries(entries.map(e => e.id === id ? { ...e, [field]: !e[field] } : e));
            };

            return (
                <div className="flex justify-center items-start h-full w-full pointer-events-auto py-12 px-4 relative">
                    {/* Floating Astronauts */}
                    <img src="https://cdn-icons-png.flaticon.com/512/3242/3242257.png" alt="Astronaut" className="astronaut top-20 right-[15%]" />
                    <img src="https://cdn-icons-png.flaticon.com/512/3242/3242257.png" alt="Astronaut" className="astronaut bottom-20 left-[15%] w-[100px]" style={{ animationDelay: '2s', transform: 'scaleX(-1)' }} />

                    <motion.div initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} className="glass-panel p-6 md:p-10 w-full max-w-5xl max-h-[90vh] flex flex-col z-10">
                        
                        <div className="mb-8 text-center">
                            <h1 className="text-3xl md:text-4xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#00d2ff] to-[#ff007f] mb-3 uppercase">Robustness Evaluation Protocol</h1>
                            <p className="text-sm text-gray-300 font-light max-w-3xl mx-auto leading-relaxed">
                                Enter data to evaluate LLMs on Code-Mixed Indian Languages. Provide token counts to calculate the <strong>Code Mixing Index (CMI)</strong>. Toggle the prediction results to compute <strong>Accuracy, PCR, and RDS</strong> as defined in your research report.
                            </p>
                        </div>

                        <div className="flex-1 overflow-y-auto pr-4 space-y-6 mb-8">
                            <AnimatePresence>
                                {entries.length === 0 && (
                                    <div className="text-center py-10 text-gray-400 font-light italic">Click "+ Add Evaluation Node" to begin data entry.</div>
                                )}
                                {entries.map((req, i) => {
                                    const cmi = ((req.tokensN - req.tokensLi) / req.tokensN) * 100;
                                    
                                    return (
                                    <motion.div key={req.id} initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.95 }} className="data-row p-6 rounded-2xl bg-white/5 border border-white/10 relative">
                                        <button onClick={() => setEntries(entries.filter(e => e.id !== req.id))} className="absolute top-4 right-4 text-red-400 hover:text-red-300 transition text-xl">✕</button>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2 block">Node #{i+1} : Code-Mixed Sentence</label>
                                                <textarea rows="2" value={req.prompt} onChange={(e) => updateField(req.id, 'prompt', e.target.value)} className="w-full input-box rounded-xl p-3 text-sm resize-none" placeholder="e.g. Yeh movie tha bilkul shandar..." />
                                            </div>
                                            <div className="flex flex-col justify-center bg-black/30 p-4 rounded-xl border border-white/5">
                                                <label className="text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2 block">CMI Calculation</label>
                                                <div className="flex gap-4 items-center mb-2">
                                                    <div className="flex flex-col w-1/2">
                                                        <span className="text-[10px] text-gray-500">Total Tokens (N)</span>
                                                        <input type="number" value={req.tokensN} onChange={e=>updateField(req.id, 'tokensN', parseInt(e.target.value)||1)} className="input-box p-1 rounded text-center" />
                                                    </div>
                                                    <div className="flex flex-col w-1/2">
                                                        <span className="text-[10px] text-gray-500">Predom. Lang Tokens (Li)</span>
                                                        <input type="number" value={req.tokensLi} onChange={e=>updateField(req.id, 'tokensLi', parseInt(e.target.value)||0)} className="input-box p-1 rounded text-center" />
                                                    </div>
                                                </div>
                                                <div className="text-right text-xs font-mono text-[#00d2ff]">
                                                    CMI = {isNaN(cmi) ? 0 : cmi.toFixed(2)}%
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            {/* ChatGPT */}
                                            <div className="space-y-2 p-4 rounded-xl bg-[#00d2ff]/10 border border-[#00d2ff]/20">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <div className="w-2 h-2 rounded-full bg-[#00d2ff] shadow-[0_0_10px_#00d2ff]"></div>
                                                    <span className="text-xs font-bold text-[#00d2ff] uppercase tracking-wider">ChatGPT</span>
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <ToggleBtn label="Mono Correct" active={req.gptMono} onClick={()=>toggleField(req.id, 'gptMono')} activeClass="bg-[#00d2ff]/20 border-[#00d2ff] text-[#00d2ff]" />
                                                    <ToggleBtn label="Code-Mixed Correct" active={req.gptMixed} onClick={()=>toggleField(req.id, 'gptMixed')} activeClass="bg-[#00d2ff]/20 border-[#00d2ff] text-[#00d2ff]" />
                                                    <ToggleBtn label="Match Mono (PCR)" active={req.gptCons} onClick={()=>toggleField(req.id, 'gptCons')} activeClass="bg-[#00d2ff]/20 border-[#00d2ff] text-[#00d2ff]" />
                                                </div>
                                            </div>

                                            {/* Gemini */}
                                            <div className="space-y-2 p-4 rounded-xl bg-[#ff007f]/10 border border-[#ff007f]/20">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <div className="w-2 h-2 rounded-full bg-[#ff007f] shadow-[0_0_10px_#ff007f]"></div>
                                                    <span className="text-xs font-bold text-[#ff007f] uppercase tracking-wider">Gemini</span>
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <ToggleBtn label="Mono Correct" active={req.gemMono} onClick={()=>toggleField(req.id, 'gemMono')} activeClass="bg-[#ff007f]/20 border-[#ff007f] text-[#ff007f]" />
                                                    <ToggleBtn label="Code-Mixed Correct" active={req.gemMixed} onClick={()=>toggleField(req.id, 'gemMixed')} activeClass="bg-[#ff007f]/20 border-[#ff007f] text-[#ff007f]" />
                                                    <ToggleBtn label="Match Mono (PCR)" active={req.gemCons} onClick={()=>toggleField(req.id, 'gemCons')} activeClass="bg-[#ff007f]/20 border-[#ff007f] text-[#ff007f]" />
                                                </div>
                                            </div>

                                            {/* Perplexity */}
                                            <div className="space-y-2 p-4 rounded-xl bg-[#ffaa00]/10 border border-[#ffaa00]/20">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <div className="w-2 h-2 rounded-full bg-[#ffaa00] shadow-[0_0_10px_#ffaa00]"></div>
                                                    <span className="text-xs font-bold text-[#ffaa00] uppercase tracking-wider">Perplexity AI</span>
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <ToggleBtn label="Mono Correct" active={req.pplxMono} onClick={()=>toggleField(req.id, 'pplxMono')} activeClass="bg-[#ffaa00]/20 border-[#ffaa00] text-[#ffaa00]" />
                                                    <ToggleBtn label="Code-Mixed Correct" active={req.pplxMixed} onClick={()=>toggleField(req.id, 'pplxMixed')} activeClass="bg-[#ffaa00]/20 border-[#ffaa00] text-[#ffaa00]" />
                                                    <ToggleBtn label="Match Mono (PCR)" active={req.pplxCons} onClick={()=>toggleField(req.id, 'pplxCons')} activeClass="bg-[#ffaa00]/20 border-[#ffaa00] text-[#ffaa00]" />
                                                </div>
                                            </div>
                                        </div>
                                    </motion.div>
                                    );
                                })}
                            </AnimatePresence>
                        </div>
                        
                        <div className="pt-6 border-t border-white/10 flex flex-col md:flex-row gap-4">
                            <button onClick={handleAdd} className="md:w-1/3 px-6 py-4 bg-white/5 text-white text-sm font-bold rounded-xl border border-white/20 hover:bg-white/10 transition whitespace-nowrap btn-glow shadow-sm">
                                + Add Evaluation Node
                            </button>
                            <button onClick={() => {
                                if(entries.length === 0) { alert("Please add at least one evaluation node first."); return; }
                                setPhase('results');
                            }} className="md:w-2/3 w-full btn-glow bg-gradient-to-r from-[#00d2ff] via-[#ff007f] to-[#ffaa00] text-white rounded-xl py-4 text-sm font-bold tracking-widest uppercase shadow-lg">
                                Compute Metrics & Launch Dashboard 🚀
                            </button>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const DeepDiveDashboard = ({ entries, setPhase }) => {
            const barRef = useRef(null);

            const getMetrics = () => {
                const count = entries.length;
                let cmiSum = 0;
                
                let gptMonoSum=0, gptMixSum=0, gptPcrSum=0;
                let gemMonoSum=0, gemMixSum=0, gemPcrSum=0;
                let ppxMonoSum=0, ppxMixSum=0, ppxPcrSum=0;

                entries.forEach(e => { 
                    cmiSum += ((e.tokensN - e.tokensLi) / e.tokensN) * 100;
                    
                    if(e.gptMono) gptMonoSum++; if(e.gptMixed) gptMixSum++; if(e.gptCons) gptPcrSum++;
                    if(e.gemMono) gemMonoSum++; if(e.gemMixed) gemMixSum++; if(e.gemCons) gemPcrSum++;
                    if(e.pplxMono) ppxMonoSum++; if(e.pplxMixed) ppxMixSum++; if(e.pplxCons) ppxPcrSum++;
                });
                
                return {
                    avgCmi: (cmiSum / count).toFixed(2),
                    gpt: {
                        accMono: ((gptMonoSum/count)*100).toFixed(1),
                        accMix: ((gptMixSum/count)*100).toFixed(1),
                        pcr: ((gptPcrSum/count)*100).toFixed(1),
                        rds: (((gptMonoSum/count)*100) - ((gptMixSum/count)*100)).toFixed(1)
                    },
                    gem: {
                        accMono: ((gemMonoSum/count)*100).toFixed(1),
                        accMix: ((gemMixSum/count)*100).toFixed(1),
                        pcr: ((gemPcrSum/count)*100).toFixed(1),
                        rds: (((gemMonoSum/count)*100) - ((gemMixSum/count)*100)).toFixed(1)
                    },
                    ppx: {
                        accMono: ((ppxMonoSum/count)*100).toFixed(1),
                        accMix: ((ppxMixSum/count)*100).toFixed(1),
                        pcr: ((ppxPcrSum/count)*100).toFixed(1),
                        rds: (((ppxMonoSum/count)*100) - ((ppxMixSum/count)*100)).toFixed(1)
                    }
                };
            };
            const metrics = getMetrics();

            useEffect(() => {
                const ctxBar = barRef.current.getContext('2d');
                Chart.defaults.color = '#a0aec0';
                Chart.defaults.font.family = 'Inter';
                
                const bar = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: ['ChatGPT', 'Gemini', 'Perplexity'],
                        datasets: [
                            {
                                label: 'Monolingual Acc (%)',
                                data: [metrics.gpt.accMono, metrics.gem.accMono, metrics.ppx.accMono],
                                backgroundColor: 'rgba(255, 255, 255, 0.2)',
                                borderRadius: 4
                            },
                            {
                                label: 'Code-Mixed Acc (%)',
                                data: [metrics.gpt.accMix, metrics.gem.accMix, metrics.ppx.accMix],
                                backgroundColor: ['#00d2ff', '#ff007f', '#ffaa00'],
                                borderRadius: 4
                            }
                        ]
                    },
                    options: { maintainAspectRatio: false, scales: { y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { grid: { display: false } } }, plugins: { legend: { labels: { color: '#fff' } } } }
                });

                return () => { bar.destroy(); }
            }, [metrics]);

            const MetricCard = ({ title, value, subtitle, color }) => (
                <div className={`bg-black/40 p-6 rounded-2xl border border-white/5 text-center shadow-[0_0_15px_rgba(0,0,0,0.5)]`}>
                    <div className="text-xs text-gray-400 uppercase tracking-widest mb-2">{title}</div>
                    <div className={`text-4xl font-mono font-bold ${color}`}>{value}</div>
                    <div className="text-[10px] text-gray-500 mt-2 uppercase">{subtitle}</div>
                </div>
            );

            return (
                <div className="absolute top-0 left-0 w-full h-[100vh] overflow-y-auto pointer-events-auto bg-[#050510]/80 backdrop-blur-xl">
                    <div className="max-w-6xl mx-auto py-16 px-6 relative z-10">
                        
                        <div className="flex justify-between items-end mb-12 border-b border-white/10 pb-6">
                            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }}>
                                <h1 className="text-4xl font-bold tracking-tight text-white mb-2">Code-Mixed Robustness Report</h1>
                                <div className="flex gap-4 items-center">
                                    <span className="bg-white/10 px-3 py-1 rounded text-xs text-gray-300 font-mono">Nodes Evaluated: {entries.length}</span>
                                    <span className="bg-white/10 px-3 py-1 rounded text-xs text-[#00d2ff] font-mono border border-[#00d2ff]/30">Avg CMI: {metrics.avgCmi}%</span>
                                </div>
                            </motion.div>
                            <button onClick={()=> setPhase('input')} className="px-6 py-3 bg-white/10 border border-white/20 text-white font-bold rounded-full hover:bg-white/20 shadow-sm transition">
                                ← Back to Data Entry
                            </button>
                        </div>

                        <div className="space-y-8">
                            
                            {/* Model Stats Container */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* ChatGPT */}
                                <motion.div initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.1 }} className="glass-panel p-6 border-t-4 border-[#00d2ff]">
                                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                        <span className="w-3 h-3 rounded-full bg-[#00d2ff] shadow-[0_0_10px_#00d2ff]"></span>
                                        ChatGPT
                                    </h2>
                                    <div className="space-y-4">
                                        <MetricCard title="Accuracy (Mixed)" value={`${metrics.gpt.accMix}%`} subtitle="Code-Mixed Sentiment Correctness" color="text-[#00d2ff]" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <MetricCard title="PCR" value={`${metrics.gpt.pcr}%`} subtitle="Prediction Consistency Rate" color="text-white" />
                                            <MetricCard title="RDS" value={metrics.gpt.rds} subtitle="Robustness Degradation" color="text-red-400" />
                                        </div>
                                    </div>
                                </motion.div>

                                {/* Gemini */}
                                <motion.div initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.2 }} className="glass-panel p-6 border-t-4 border-[#ff007f]">
                                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                        <span className="w-3 h-3 rounded-full bg-[#ff007f] shadow-[0_0_10px_#ff007f]"></span>
                                        Gemini
                                    </h2>
                                    <div className="space-y-4">
                                        <MetricCard title="Accuracy (Mixed)" value={`${metrics.gem.accMix}%`} subtitle="Code-Mixed Sentiment Correctness" color="text-[#ff007f]" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <MetricCard title="PCR" value={`${metrics.gem.pcr}%`} subtitle="Prediction Consistency Rate" color="text-white" />
                                            <MetricCard title="RDS" value={metrics.gem.rds} subtitle="Robustness Degradation" color="text-red-400" />
                                        </div>
                                    </div>
                                </motion.div>

                                {/* Perplexity */}
                                <motion.div initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.3 }} className="glass-panel p-6 border-t-4 border-[#ffaa00]">
                                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                        <span className="w-3 h-3 rounded-full bg-[#ffaa00] shadow-[0_0_10px_#ffaa00]"></span>
                                        Perplexity
                                    </h2>
                                    <div className="space-y-4">
                                        <MetricCard title="Accuracy (Mixed)" value={`${metrics.ppx.accMix}%`} subtitle="Code-Mixed Sentiment Correctness" color="text-[#ffaa00]" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <MetricCard title="PCR" value={`${metrics.ppx.pcr}%`} subtitle="Prediction Consistency Rate" color="text-white" />
                                            <MetricCard title="RDS" value={metrics.ppx.rds} subtitle="Robustness Degradation" color="text-red-400" />
                                        </div>
                                    </div>
                                </motion.div>
                            </div>

                            <motion.div initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.4 }} className="glass-panel p-8 w-full">
                                <h3 className="text-xl font-bold text-white mb-2">Performance Degradation Analysis</h3>
                                <p className="text-sm text-gray-400 mb-6 border-b border-white/10 pb-4">Comparison of Model Accuracy: Monolingual Baseline vs. Code-Mixed Input</p>
                                <div className="h-80"><canvas ref={barRef}></canvas></div>
                            </motion.div>

                            <div className="h-20"></div> 
                        </div>
                    </div>
                </div>
            )
        };

        const App = () => {
            const [phase, setPhase] = useState('input');
            const [entries, setEntries] = useState([]); 

            return (
                <AnimatePresence mode="wait">
                    {phase === 'input' && <InputForm key="input" entries={entries} setEntries={setEntries} setPhase={setPhase} />}
                    {phase === 'results' && <DeepDiveDashboard key="results" entries={entries} setPhase={setPhase} />}
                </AnimatePresence>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('ui-layer'));
        root.render(<App />);
    </script>
</body>
</html>
